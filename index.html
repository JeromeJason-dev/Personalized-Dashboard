<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-8 space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Personalized Webpage</h1>
            <p class="text-gray-500 mt-2">Enter your details to generate your custom dashboard.</p>
        </div>

        <form id="userForm" class="space-y-4">
            <div>
                <label for="userName" class="block text-sm font-semibold text-gray-700">Your Name</label>
                <input type="text" id="userName" required autocomplete="name"
                    class="mt-1 block w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm placeholder-gray-400"
                    placeholder="Mike Tyson">
            </div>
            <div>
                <label for="userAge" class="block text-sm font-semibold text-gray-700">Your Age</label>
                <input type="number" id="userAge" required min="1" max="100"
                    class="mt-1 block w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm placeholder-gray-400"
                    placeholder="18">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Generate Dashboard
            </button>
        </form>

        <div id="dashboard" class="hidden space-y-6 pt-4 border-t border-gray-100 animate-fade-in">

            <div class="bg-indigo-50 rounded-xl p-5 border border-indigo-100 text-center">
                <h2 id="greeting" class="text-2xl font-bold text-indigo-900"></h2>
                <p id="ageInMonths" class="text-indigo-700 mt-1 font-medium"></p>
            </div>

            <div id="contentAccess" class="rounded-xl p-4 flex items-center space-x-3 border font-medium">
            </div>

            <div class="space-y-2">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Your Daily Manifestation</h3>
                <div id="quoteContainer" class="space-y-2">
                </div>
            </div>

            <button id="clearBtn"
                class="w-full text-sm text-red-500 hover:text-red-700 hover:underline font-medium transition text-center pt-2">
                Reset & Clear My Data
            </button>
        </div>
    </div>
    <script src="script.js" type="text/javascript"></script>
    
</body>
</html>
